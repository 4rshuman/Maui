<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maui's Birthday  😛</title>

<style>

body{
  margin:0;
  background:linear-gradient(135deg,#ffd6f0,#ffffff);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  font-family:Arial, sans-serif;
  overflow:hidden;
  padding:10px;
  box-sizing:border-box;
}

.container{
  display:flex;
  align-items:flex-start;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
  max-width:1000px;
  width:100%;
}

/* memory photos */

.memories{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.memories img{
  width:80px;
  height:80px;
  border-radius:12px;
  object-fit:cover;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* card */

.scene{
  width:380px;
  max-width:90vw;
  height:500px;
  perspective:1200px;
}

.card{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:1s;
  cursor:pointer;
}

.card.open{
  transform:rotateY(-170deg);
}

.front{
  position:absolute;
  width:100%;
  height:100%;
  background:#ff8ec7;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  border-radius:12px;
  backface-visibility:hidden;
  text-align:center;
  padding:10px;
  box-sizing:border-box;
}

.inside{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  border-radius:12px;
  padding:15px;
  box-sizing:border-box;
  transform:rotateY(180deg);
  backface-visibility:hidden;
  display:flex;
  flex-direction:column;
}

/* video */

.videoBox video{
  width:100%;
  height:auto;
  border-radius:10px;
  margin-bottom:10px;
}

/* message */

#message{
  font-size:16px;
  color:#444;
  overflow-y:auto;
  flex:1;
  padding:10px;
  scrollbar-width:none;
  margin-bottom:0;
  scroll-behavior: smooth;
  border:1px solid #ffb7d5;
  border-radius:10px;
  background:#fff0f7;
}

#message::-webkit-scrollbar{
  display:none;
}

h1{
  margin:5px 0;
  color:#ff4fa3;
  text-align:center;
}

h2{
  margin:0;
  text-align:center;
}

/* hello kitty */

.kitty{
  position:absolute;
  bottom:10px;
  right:10px;
  width:70px;
  animation:dance 1s infinite alternate;
}

@keyframes dance{
  0%{transform:rotate(-10deg)}
  100%{transform:rotate(10deg)}
}

/* petals */

.petal{
  position:absolute;
  width:14px;
  height:14px;
  background:#ffb7d5;
  border-radius:3px;
  opacity:0.8;
  animation:fall linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-10vh) rotate(0)}
  100%{transform:translateY(100vh) rotate(360deg)}
}

/* fireworks */

.firework{
  position:absolute;
  width:6px;
  height:6px;
  background:pink;
  border-radius:50%;
  animation:explode 1s ease-out forwards;
}

@keyframes explode{
  0%{transform:scale(1)}
  100%{transform:scale(20);opacity:0}
}

/* responsive for phones */

@media(max-width:700px){
  .container{
    flex-direction:column;
    align-items:center;
  }

  .memories{
    flex-direction:row;
    flex-wrap:wrap;
    justify-content:center;
  }

  .memories img{
    width:60px;
    height:60px;
  }

  .scene{
    height:450px;
  }

  #message{
    font-size:14px;
  }
}

</style>
</head>

<body>

<div class="container">

  <!-- LEFT MEMORIES -->

  <div class="memories">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
    <img src="photo4.jpg">
  </div>

  <!-- CARD -->

  <div class="scene">

    <div class="card" id="card">

      <div class="front">
        🎁 Click to Open Cutie
      </div>

      <div class="inside">

        <div class="videoBox">
          <video autoplay muted loop playsinline>
            <source src="video.mp4">
          </video>
        </div>

        <h1>Hapi Birthday 🎂</h1>
        <h2 style="color:#ff79b0">Tashi</h2>

        <div id="message"></div>

        <img class="kitty" src="https://media.tenor.com/0AVbKGY_MxMAAAAC/hello-kitty-dance.gif">

      </div>

    </div>

  </div>

  <!-- RIGHT MEMORIES -->

  <div class="memories">
    <img src="photo5.jpg">
    <img src="photo6.jpg">
    <img src="photo7.jpg">
    <img src="photo8.jpg">
  </div>

</div>

<audio id="music">
    <source src="idk.m4a" type="audio/mp4">
    <source src="idk.m4a" type="audio/x-m4a">
</audio>

<script>
const card = document.getElementById("card");
const music = document.getElementById("music");
const message = document.getElementById("message");

const text = "happiest birthday to my favorite person, even tho there's about 4000 kms between us, no distance could ever dull the spark of our friendship. youre truly the prettiest girl ive ever seen. youre so adorable, sweet, kind and elegant. im soo incredibly grateful to have you in my life bbg 🙂 youre not just a best friend, youre my happiness love. thinking about all our late night convos makes me realize how lucky i am to have found sucha pretty soul in you bae. i honestly dunno what i'd do without you. i miss you so much, and im wishing dat i could just teleport to give you a huge birthday hug. i also wanted to tell you how much i absolutely loved the letter you wrote me 🙂 ive re read it so many times.this is all what i wanted to say, i hope your day is as beautiful as you are, filled with all the love, cake, and joy you deserve, plus im already counting down the days until we can finally celebrate in person. mahal kita!🩷";

let i = 0;
let started = false; // Prevents the typing from restarting every click

function typeWriter() {
  if (i < text.length) {
    message.innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
    message.scrollTop = message.scrollHeight; 
  }
}

card.onclick = () => {
  card.classList.toggle("open");
  
  // Play music (Browsers require a click to play audio)
  music.play().catch(e => console.log("Audio play blocked until user interaction"));

  if (!started) {
    typeWriter();
    petals();
    fireworks();
    started = true;
  }
};

function petals() {
  for (let i = 0; i < 40; i++) {
    let p = document.createElement("div");
    p.className = "petal";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (5 + Math.random() * 5) + "s";
    document.body.appendChild(p);
  }
}

function fireworks() {
  for (let i = 0; i < 25; i++) {
    let f = document.createElement("div");
    f.className = "firework";
    f.style.left = Math.random() * 100 + "vw";
    f.style.top = Math.random() * 60 + "vh";
    document.body.appendChild(f);
  }
}
</script>
